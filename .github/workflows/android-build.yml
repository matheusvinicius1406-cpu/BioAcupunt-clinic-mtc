name: Android CI – Assemble Debug

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  assemble:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Make gradlew executable
        run: chmod +x ./gradlew || true

      - name: Write Gemini API key for this build
        # local.properties doesn't exist on the runner (gitignored — see commit
        # a15237f, sdk.dir there would point at a dev machine that doesn't exist
        # here). AGP falls back to $ANDROID_HOME for the SDK path regardless, so
        # this file only needs the one line the secrets-gradle-plugin reads.
        # Add the real key at: repo Settings > Secrets and variables > Actions >
        # New repository secret > GEMINI_API_KEY. Missing/empty secret still
        # builds fine (AndroidAiSecretsProvider treats a blank key as "not set").
        run: echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> local.properties

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Build Release APK (R8 + lintVital)
        run: ./gradlew assembleRelease

      - name: Upload Release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/*.apk
