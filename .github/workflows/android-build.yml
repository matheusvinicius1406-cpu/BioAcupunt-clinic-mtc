name: Android CI Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708
          accept-android-sdk-licenses: true
          log-accepted-android-sdk-licenses: true
          packages:
            - platform-tools
            - platforms;android-36
            - build-tools;36.0.0
            - ndk;27.0.12077973

      - name: Prepare Gradle wrapper
        run: chmod +x gradlew

      - name: Generate local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          if [ -n "${{ secrets.GEMINI_API_KEY }}" ]; then
            echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> local.properties
          else
            echo "GEMINI_API_KEY=REPLACE_ME" >> local.properties
          fi

      - name: Lint
        run: ./gradlew lint --continue
        continue-on-error: true

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest --stacktrace
        continue-on-error: true

      - name: Build Debug APK
        run: ./gradlew clean assembleDebug --stacktrace

      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Upload Release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk-unsigned
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload Lint Report
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          retention-days: 7
          if-no-files-found: ignore
