name: Backend CI

on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: bioacupunt
          POSTGRES_PASSWORD: bioacupunt
          POSTGRES_DB: bioacupunt_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bioacupunt"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run Alembic migrations against Postgres
        env:
          DATABASE_URL: postgresql+asyncpg://bioacupunt:bioacupunt@localhost:5432/bioacupunt_test
          JWT_SECRET_KEY: ci-test-secret
          DOCUMENT_HASH_SECRET: ci-test-document-secret
        run: python -m alembic upgrade head

      - name: Run tests (unit + integration + e2e)
        env:
          DATABASE_URL: postgresql+asyncpg://bioacupunt:bioacupunt@localhost:5432/bioacupunt_test
          JWT_SECRET_KEY: ci-test-secret
          DOCUMENT_HASH_SECRET: ci-test-document-secret
        run: python -m pytest -v
