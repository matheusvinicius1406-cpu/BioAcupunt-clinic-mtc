services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: bioacupunt
      POSTGRES_PASSWORD: bioacupunt
      POSTGRES_DB: bioacupunt
    volumes:
      - bioacupunt_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bioacupunt"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://bioacupunt:bioacupunt@db:5432/bioacupunt
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?set a real secret in .env}
      DOCUMENT_HASH_SECRET: ${DOCUMENT_HASH_SECRET:?set a real secret in .env}
      ENVIRONMENT: production
    ports:
      - "8000:8000"

volumes:
  bioacupunt_db_data:
