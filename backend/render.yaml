# Render Blueprint — provisions the BioAcupunt backend + a managed Postgres.
# In Render: New > Blueprint, connect this repo, and Render reads this file.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: bioacupunt-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bioacupunt-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DOCUMENT_HASH_SECRET
        generateValue: true
      - key: ENVIRONMENT
        value: production
      # First admin created automatically on first boot (only while the DB has
      # no users). Set a real email + a strong password here in the Render
      # dashboard before the first deploy, then use them to log in.
      - key: BOOTSTRAP_ADMIN_EMAIL
        sync: false
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false
      - key: BOOTSTRAP_CLINIC_NAME
        value: Minha Clínica

databases:
  - name: bioacupunt-db
    plan: free
    databaseName: bioacupunt
    user: bioacupunt
