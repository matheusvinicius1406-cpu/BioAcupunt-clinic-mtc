<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<meta name="design_doc_mode" content="canvas">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,0">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:#EDEBE5;min-height:100vh;-webkit-font-smoothing:antialiased}
.material-symbols-rounded{font-family:'Material Symbols Rounded';font-weight:normal;font-style:normal;line-height:1;letter-spacing:normal;text-transform:none;display:inline-block;white-space:nowrap;direction:ltr;-webkit-font-smoothing:antialiased;font-feature-settings:'liga'}
@keyframes fadeSlideIn{0%{opacity:0;transform:translateY(16px) scale(0.99)}100%{opacity:1;transform:translateY(0) scale(1)}}
@keyframes breathe{0%,100%{opacity:.25;transform:scale(1)}50%{opacity:.5;transform:scale(1.12)}}
</style>
</helmet>

<section style="padding:40px;display:flex;flex-direction:column;align-items:flex-start;gap:14px">
  <div style="display:flex;align-items:center;gap:10px"><span style="font-size:12px;font-weight:700;color:#fff;background:#4A6B2A;padding:4px 12px;border-radius:20px">1a</span><span style="font-size:13px;color:#5A5548">Login — BioAcupunt Clinical OS</span></div>

  <div style="width:420px;height:844px;background:#FFFFFF;border-radius:40px;box-shadow:0 24px 80px rgba(0,0,0,0.28),0 0 0 2px #E6E2DA inset;overflow:hidden;position:relative;display:flex;flex-direction:column">

    <div style="position:absolute;top:-120px;right:-100px;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(74,107,42,0.12),transparent 70%);animation:breathe 5s ease-in-out infinite;pointer-events:none"></div>
    <div style="position:absolute;bottom:-140px;left:-110px;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(201,169,110,0.14),transparent 70%);pointer-events:none"></div>

    <div style="flex:1;overflow-y:auto;padding:56px 32px 32px;display:flex;flex-direction:column;animation:fadeSlideIn .5s cubic-bezier(0.25,0.46,0.45,0.94) both;position:relative">

      <div style="display:flex;flex-direction:column;align-items:center;gap:14px;margin-bottom:36px">
        <div style="width:64px;height:64px;background:linear-gradient(135deg,#4A6B2A,#6B8F4A);border-radius:20px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:30px;box-shadow:0 8px 24px rgba(74,107,42,0.25)">☯</div>
        <div style="text-align:center">
          <div style="font-weight:700;font-size:20px;letter-spacing:-0.3px;color:#1E1B16">Bio<span style="color:#C9A96E">Acupunt</span></div>
          <div style="font-size:12px;color:#8A8578;margin-top:4px;letter-spacing:0.2px">Clinical OS · centro de comando do terapeuta MTC</div>
        </div>
      </div>

      <div style="display:flex;background:#F6F5F2;border-radius:16px;padding:4px;margin-bottom:26px;border:1px solid #E6E2DA">
        <button style="flex:1;padding:10px;border-radius:12px;border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;background:#4A6B2A;color:#fff">Entrar</button>
        <button style="flex:1;padding:10px;border-radius:12px;border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;background:transparent;color:#5A5548">Criar conta</button>
      </div>

      <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:14px">
        <label style="font-size:11px;font-weight:600;color:#8A8578;text-transform:uppercase;letter-spacing:.3px">E-mail profissional</label>
        <div style="display:flex;align-items:center;gap:10px;background:#F6F5F2;border:1.5px solid #E6E2DA;border-radius:14px;padding:12px 16px">
          <span class="material-symbols-rounded" style="font-size:20px;color:#8A8578">mail</span>
          <input type="email" placeholder="dra.camila@bioacupunt.com" style="flex:1;background:none;border:none;outline:none;font-size:14px;font-family:inherit;color:#1E1B16">
        </div>
      </div>

      <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:10px">
        <label style="font-size:11px;font-weight:600;color:#8A8578;text-transform:uppercase;letter-spacing:.3px">Senha</label>
        <div style="display:flex;align-items:center;gap:10px;background:#F6F5F2;border:1.5px solid #4A6B2A;border-radius:14px;padding:12px 16px;box-shadow:0 0 0 3px rgba(74,107,42,0.12)">
          <span class="material-symbols-rounded" style="font-size:20px;color:#4A6B2A">lock</span>
          <input type="password" placeholder="••••••••••" style="flex:1;background:none;border:none;outline:none;font-size:14px;font-family:inherit;color:#1E1B16">
          <span class="material-symbols-rounded" style="font-size:20px;color:#8A8578;cursor:pointer">visibility</span>
        </div>
      </div>

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:26px">
        <label style="display:flex;align-items:center;gap:8px;font-size:12px;color:#5A5548;cursor:pointer">
          <span style="width:18px;height:18px;border-radius:6px;border:1.5px solid #4A6B2A;background:#4A6B2A;display:flex;align-items:center;justify-content:center"><span class="material-symbols-rounded" style="font-size:14px;color:#fff">check</span></span>
          Manter conectado
        </label>
        <a href="#" style="font-size:12px;font-weight:600;color:#4A6B2A">Esqueceu a senha?</a>
      </div>

      <button style="width:100%;padding:15px;border-radius:16px;border:none;background:#4A6B2A;color:#fff;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;box-shadow:0 10px 28px rgba(74,107,42,0.22);display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:18px">
        Entrar na clínica
        <span class="material-symbols-rounded" style="font-size:18px">arrow_forward</span>
      </button>

      <div style="display:flex;align-items:center;gap:12px;margin-bottom:18px">
        <div style="flex:1;height:1px;background:#E6E2DA"></div>
        <span style="font-size:11px;color:#8A8578">ou acesse com</span>
        <div style="flex:1;height:1px;background:#E6E2DA"></div>
      </div>

      <div style="display:flex;gap:10px;margin-bottom:28px">
        <button style="flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;border-radius:14px;border:1px solid #E6E2DA;background:#fff;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;color:#1E1B16"><span class="material-symbols-rounded" style="font-size:18px;color:#4A6B2A">fingerprint</span>Biometria</button>
        <button style="flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;border-radius:14px;border:1px solid #E6E2DA;background:#fff;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;color:#1E1B16"><span class="material-symbols-rounded" style="font-size:18px;color:#C9A96E">badge</span>Google Drive</button>
      </div>

      <div style="margin-top:auto;display:flex;flex-direction:column;align-items:center;gap:10px;padding-top:8px">
        <div style="display:flex;gap:8px"><span style="font-size:10px;font-weight:600;color:#4A6B2A;background:#EAF3E0;padding:4px 12px;border-radius:20px">✓ Selo de Excelência Clínica</span></div>
        <div style="font-size:11px;color:#8A8578">v2.1.0 · Sincronizado com Supabase · <a href="#" style="color:#4A6B2A;font-weight:600">Suporte</a></div>
      </div>

    </div>
  </div>
</section>
</x-dc>
</body>
</html>
